<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente de fondo -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#0d1f35"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>

    <!-- Gradiente para el texto principal -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9d1d9"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#58a6ff"/>
    </linearGradient>

    <!-- Gradiente ola inferior -->
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#388bfd;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0.6"/>
    </linearGradient>

    <!-- Clip para la ola -->
    <clipPath id="clip">
      <rect width="900" height="200"/>
    </clipPath>

    <!-- Animación fade-in -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700&amp;family=Inter:wght@300&amp;display=swap');

      .name {
        font-family: 'Syne', 'Segoe UI', sans-serif;
        font-size: 48px;
        font-weight: 700;
        fill: url(#textGrad);
        letter-spacing: -1px;
        animation: fadeUp 1s ease forwards;
        opacity: 0;
      }
      .subtitle {
        font-family: 'Inter', 'Segoe UI', sans-serif;
        font-size: 16px;
        font-weight: 300;
        fill: #58a6ff;
        letter-spacing: 4px;
        text-transform: uppercase;
        animation: fadeUp 1s ease 0.4s forwards;
        opacity: 0;
      }
      .tagline {
        font-family: 'Inter', 'Segoe UI', sans-serif;
        font-size: 12px;
        font-weight: 300;
        fill: #8b949e;
        letter-spacing: 2px;
        animation: fadeUp 1s ease 0.7s forwards;
        opacity: 0;
      }
      .dot {
        fill: #58a6ff;
        animation: pulse 2s ease-in-out 1.2s infinite;
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.4; r: 3; }
        50%       { opacity: 1;   r: 5; }
      }
      .line {
        stroke: #58a6ff;
        stroke-opacity: 0.3;
        animation: grow 1.2s ease 0.3s forwards;
        stroke-dasharray: 400;
        stroke-dashoffset: 400;
      }
      @keyframes grow {
        to { stroke-dashoffset: 0; }
      }
    </style>
  </defs>

  <!-- Fondo -->
  <rect width="900" height="200" fill="url(#bg)"/>

  <!-- Partículas decorativas -->
  <circle cx="60"  cy="30"  r="1.5" fill="#58a6ff" opacity="0.3"/>
  <circle cx="820" cy="50"  r="1"   fill="#58a6ff" opacity="0.2"/>
  <circle cx="750" cy="170" r="2"   fill="#58a6ff" opacity="0.15"/>
  <circle cx="130" cy="160" r="1.5" fill="#58a6ff" opacity="0.2"/>
  <circle cx="450" cy="20"  r="1"   fill="#c9d1d9" opacity="0.15"/>
  <circle cx="880" cy="140" r="1.5" fill="#58a6ff" opacity="0.2"/>
  <circle cx="20"  cy="110" r="1"   fill="#58a6ff" opacity="0.15"/>

  <!-- Línea decorativa izquierda -->
  <line class="line" x1="100" y1="100" x2="300" y2="100" stroke-width="0.5"/>

  <!-- Línea decorativa derecha -->
  <line class="line" x1="600" y1="100" x2="800" y2="100" stroke-width="0.5"/>

  <!-- Punto central izquierdo -->
  <circle class="dot" cx="300" cy="100" r="3"/>

  <!-- Punto central derecho -->
  <circle class="dot" cx="600" cy="100" r="3" style="animation-delay: 1.5s"/>

  <!-- Nombre principal -->
  <text class="name" x="450" y="95" text-anchor="middle">emanuelfuduli</text>

  <!-- Subtítulo -->
  <text class="subtitle" x="450" y="128" text-anchor="middle">Frontend · Backend Developer</text>

  <!-- Tagline -->
  <text class="tagline" x="450" y="155" text-anchor="middle">Estudiante de Ingeniería Informática 🎓</text>

  <!-- Ola inferior sutil -->
  <path d="M0,185 Q225,175 450,182 T900,178 L900,200 L0,200 Z" fill="#58a6ff" opacity="0.06"/>
  <path d="M0,190 Q225,182 450,188 T900,185 L900,200 L0,200 Z" fill="#58a6ff" opacity="0.04"/>
</svg>
